name: Run Autopkg

on:
# Uncomment the schedule to run recurringly
#  schedule:
#    - cron: "0 9 * * TUE"  # Weekly on Tuesdays at 9 AM UTC

  workflow_dispatch:
    inputs:
      recipes:
        description: List of recipes to run separated by spaces
        required: false

jobs:
  run-autopkg:
    runs-on: macos-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Munki
        run: |
          # Pin to a specific version for reproducibility
          curl -OL https://github.com/munki/munki/releases/download/v6.6.4/munkitools-6.6.4.4708.pkg
          sudo installer -pkg munkitools-6.6.4.4708.pkg -target /
          sudo rm munkitools-6.6.4.4708.pkg

      - name: Install AutoPkg
        run: |
          curl -OL https://github.com/autopkg/autopkg/releases/download/v2.7.3/autopkg-2.7.3.pkg
          sudo installer -pkg autopkg-2.7.3.pkg -target /
          sudo rm autopkg-2.7.3.pkg

      - name: Configure AutoPkg
        env:
          TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          defaults write com.github.autopkg RECIPE_OVERRIDE_DIRS "$GITHUB_WORKSPACE"/autopkg_overrides
          defaults write com.github.autopkg FAIL_RECIPES_WITHOUT_TRUST_INFO -bool YES
          defaults write com.github.autopkg MUNKI_REPO "$GITHUB_WORKSPACE"/munki_repo
          defaults write com.github.autopkg GITHUB_TOKEN "$TOKEN"

      # Add the parent repos needed by your recipe overrides.
      # See: https://github.com/autopkg/autopkg/wiki/Recipe-Repos
      - name: Add AutoPkg repos
        run: |
          autopkg repo-add recipes
          # autopkg repo-add your-org/your-recipes
          # autopkg repo-add another-recipes

      - name: Run makecatalogs
        run: /usr/local/munki/makecatalogs -s -f munki_repo
        continue-on-error: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Run AutoPkg
        run: |
          git config --global user.name "Auto Packager"
          uv run bin/autopkg_tools.py
        env:
          BUCKET: ${{ secrets.S3_STORAGE_BUCKET }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          INPUT_RECIPES: ${{ github.event.inputs.recipes }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
